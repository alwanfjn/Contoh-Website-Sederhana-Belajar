<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch The Box Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:850px;
    text-align:center;
}

h1{
    margin-bottom:10px;
}

.info{
    display:flex;
    justify-content:space-around;
    margin:20px 0;
    font-size:22px;
    font-weight:bold;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#00c853;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#gameArea{
    position:relative;
    margin-top:25px;
    width:100%;
    height:500px;
    border-radius:15px;
    background:white;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

#box{
    position:absolute;
    width:70px;
    height:70px;
    background:#ff1744;
    border-radius:10px;
    cursor:pointer;
    display:none;
    transition:.15s;
}

#box:hover{
    transform:scale(1.1);
}

#gameOver{
    margin-top:20px;
    font-size:30px;
    display:none;
    color:yellow;
}

footer{
    margin-top:20px;
    opacity:.7;
}
</style>

</head>
<body>

<div class="container">

<h1>🎮 Catch The Box</h1>

<p>Klik kotak merah sebanyak mungkin sebelum waktu habis.</p>

<div class="info">
<div>⭐ Score : <span id="score">0</span></div>
<div>⏱ Time : <span id="time">30</span></div>
<div>🏆 High Score : <span id="highscore">0</span></div>
</div>

<button onclick="startGame()">Start Game</button>

<div id="gameArea">
<div id="box"></div>
</div>

<div id="gameOver"></div>

<footer>
Made Alwan Fajrian
</footer>

</div>

<script>

const box=document.getElementById("box");
const area=document.getElementById("gameArea");
const scoreText=document.getElementById("score");
const timeText=document.getElementById("time");
const highText=document.getElementById("highscore");
const gameOver=document.getElementById("gameOver");

let score=0;
let time=30;
let timer;
let gameRunning=false;

let highscore=localStorage.getItem("highscore") || 0;
highText.innerHTML=highscore;

function randomPosition(){

    const maxX=area.clientWidth-70;
    const maxY=area.clientHeight-70;

    const x=Math.random()*maxX;
    const y=Math.random()*maxY;

    box.style.left=x+"px";
    box.style.top=y+"px";

}

box.onclick=function(){

    if(!gameRunning) return;

    score++;

    scoreText.innerHTML=score;

    randomPosition();

}

function startGame(){

    clearInterval(timer);

    score=0;
    time=30;

    scoreText.innerHTML=score;
    timeText.innerHTML=time;

    gameRunning=true;

    gameOver.style.display="none";

    box.style.display="block";

    randomPosition();

    timer=setInterval(()=>{

        time--;

        timeText.innerHTML=time;

        randomPosition();

        if(time<=0){

            clearInterval(timer);

            gameRunning=false;

            box.style.display="none";

            if(score>highscore){

                highscore=score;

                localStorage.setItem("highscore",highscore);

                highText.innerHTML=highscore;

            }

            gameOver.style.display="block";
            gameOver.innerHTML=
            "🎉 Game Selesai!<br>Score Kamu : <b>"+score+
            "</b><br><br>Tekan <b>Start Game</b> untuk bermain lagi.";

        }

    },1000);

}

</script>

</body>
</html>
